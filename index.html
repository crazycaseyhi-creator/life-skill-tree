<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Life Skill Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; margin: 0; padding: 0; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        #mynetwork { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* 90-Second Loader SVG Styles */
        .progress-ring__circle {
            transition: stroke-dashoffset 90s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body>

    <div class="ui-layer p-6 flex justify-between items-start">
        <div>
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-emerald-400 to-purple-400 uppercase tracking-widest drop-shadow-lg">Life Constellation</h1>
            <p class="text-slate-400 font-mono mt-1 text-sm">Mind // Body // Soul</p>
        </div>
        <div class="flex gap-4">
            <button onclick="document.getElementById('devConsole').classList.remove('hidden')" class="interactive bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 font-mono text-sm py-3 px-6 rounded-full transition-all">
                /> Dev Console
            </button>
            <button onclick="document.getElementById('addModal').classList.remove('hidden')" class="interactive bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all">
                + New Seed
            </button>
        </div>
    </div>

    <div id="mynetwork"></div>

    <div id="addModal" class="hidden interactive fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border-2 border-purple-500 p-8 rounded-2xl max-w-lg w-full shadow-[0_0_40px_rgba(168,85,247,0.3)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-purple-400 uppercase tracking-tight">Plant a New Seed</h2>
                <button onclick="document.getElementById('addModal').classList.add('hidden')" class="text-slate-500 hover:text-white">✕</button>
            </div>
            
            <div class="mb-4">
                <label for="newNodeLabel" class="block text-slate-300 text-sm font-bold mb-2">Seed Name</label>
                <input type="text" id="newNodeLabel" class="bg-slate-950 border border-slate-700 rounded w-full py-2 px-3 text-slate-200 leading-tight focus:outline-none focus:border-purple-500" placeholder="e.g., Learn French, Daily Meditation">
            </div>

            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-bold mb-2">Connects To (Parents)</label>
                <div class="flex flex-wrap gap-4">
                    <label class="inline-flex items-center text-slate-300 text-sm font-medium cursor-pointer">
                        <input type="checkbox" id="parentMind" name="seedParents" value="Mind" class="form-checkbox h-5 w-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 transition-colors duration-200">
                        <span class="ml-2">The Mind</span>
                    </label>
                    <label class="inline-flex items-center text-slate-300 text-sm font-medium cursor-pointer">
                        <input type="checkbox" id="parentBody" name="seedParents" value="Body" class="form-checkbox h-5 w-5 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500 transition-colors duration-200">
                        <span class="ml-2">The Body</span>
                    </label>
                    <label class="inline-flex items-center text-slate-300 text-sm font-medium cursor-pointer">
                        <input type="checkbox" id="parentSoul" name="seedParents" value="Soul" class="form-checkbox h-5 w-5 text-purple-600 rounded border-gray-300 focus:ring-purple-500 transition-colors duration-200">
                        <span class="ml-2">The Soul</span>
                    </label>
                </div>
            </div>

            <button onclick="saveNewNode()" class="w-full py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg transition-colors uppercase tracking-widest shadow-[0_0_15px_rgba(168,85,247,0.5)]">
                Plant Seed
            </button>
        </div>
    </div>

    <div id="devConsole" class="hidden interactive fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border-2 border-emerald-500 p-8 rounded-2xl max-w-2xl w-full shadow-[0_0_40px_rgba(16,185,129,0.3)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-emerald-400 uppercase tracking-tight">The Architect's Console</h2>
                <button onclick="document.getElementById('devConsole').classList.add('hidden')" class="text-slate-500 hover:text-white">✕</button>
            </div>
            
            <div class="bg-slate-950 p-4 rounded border border-slate-800 mb-6">
                <p class="text-xs text-slate-500 uppercase mb-3">API Vault (Saves Locally)</p>
                <div class="grid grid-cols-2 gap-4">
                    <input type="password" id="geminiKey" class="bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-xs focus:border-emerald-500 outline-none" placeholder="Gemini API Key">
                    <input type="password" id="githubToken" class="bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-xs focus:border-emerald-500 outline-none" placeholder="GitHub Personal Access Token">
                    <input type="text" id="githubRepo" class="bg-slate-900 border border-slate-700 rounded p-2 text-slate-300 text-xs focus:border-emerald-500 outline-none col-span-2" placeholder="GitHub Path (e.g., crazycaseyhi-creator/life-skill-tree)">
                </div>
                <button onclick="saveVaultKeys()" class="mt-3 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1 rounded">Save to Vault</button>
            </div>

            <p class="text-xs text-slate-500 uppercase mb-1">Command The Oracle</p>
            <textarea id="aiPrompt" rows="3" class="w-full bg-slate-950 border border-slate-700 rounded p-3 text-slate-200 mb-4 focus:outline-none focus:border-emerald-500 font-mono text-sm" placeholder="e.g., 'Change the text color of the header from Emerald to Pink'"></textarea>
            
            <button onclick="executeSelfModification()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-colors uppercase tracking-widest flex justify-center items-center gap-2">
                Rewrite Source Code
            </button>
        </div>
    </div>

    <div id="deploymentOverlay" class="hidden interactive fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[100]">
        <h2 class="text-3xl font-bold text-emerald-400 mb-2 uppercase tracking-widest animate-pulse">Deploying to GitHub Pages</h2>
        <p class="text-slate-500 font-mono mb-8 text-sm">Do not close this tab. Rewiring neural architecture...</p>
        
        <svg class="w-48 h-48" viewBox="0 0 100 100">
            <circle class="text-slate-800 stroke-current" stroke-width="4" cx="50" cy="50" r="45" fill="transparent"></circle>
            <circle id="loadingRing" class="text-emerald-500 progress-ring__circle stroke-current" stroke-width="4" stroke-linecap="round" cx="50" cy="50" r="45" fill="transparent" stroke-dasharray="283" stroke-dashoffset="283"></circle>
        </svg>
        <div id="countdownText" class="mt-6 text-4xl font-mono text-slate-300">90s</div>
    </div>

    <script>
        let treeData = JSON.parse(localStorage.getItem('lifeSkillTree')) || {
            nodes: [{id:"Mind",label:"The Mind",group:"planet"},{id:"Body",label:"The Body",group:"planet"},{id:"Soul",label:"The Soul",group:"planet"},{id:"Compendium",label:"Psychological\nCompendium",group:"withered"},{id:"Breathwork",label:"Breathing\nTechniques",group:"bridge"}],
            edges: [{from:"Mind",to:"Compendium"},{from:"Body",to:"Breathwork"},{from:"Soul",to:"Breathwork"}],
            quests: {}
        };
        let network = null;

        function initNetwork() {
            const container = document.getElementById('mynetwork');
            const R = 180;
            treeData.nodes.forEach(n => {
                if(n.id==='Mind'){n.x=0;n.y=-R;n.fixed=true;}
                if(n.id==='Body'){n.x=R*0.866;n.y=R*0.5;n.fixed=true;}
                if(n.id==='Soul'){n.x=-R*0.866;n.y=R*0.5;n.fixed=true;}
            });
            network = new vis.Network(container, {nodes: new vis.DataSet(treeData.nodes), edges: new vis.DataSet(treeData.edges)}, {
                nodes: { shape: 'dot', size: 20, font: { color: '#e2e8f0', size: 14 } },
                edges: { width: 1, color: { opacity: 0 } }, // Made edges completely transparent
                groups: {
                    planet: { size: 35, color: { background: '#0f172a', border: '#818cf8' } },
                    active: { color: { background: '#064e3b', border: '#10b981' } },
                    withered: { color: { background: '#291c1a', border: '#78350f' } },
                    bridge: { color: { background: '#1e1b4b', border: '#a855f7' } }
                },
                physics: { 
                    forceAtlas2Based: { 
                        gravitationalConstant: -120, // Adjusted for slightly more repulsion between nodes
                        springLength: 300,           // Adjusted for more space between connected nodes
                        centralGravity: -0.1         // Negative central gravity to repel nodes from the center
                    },
                    solver: 'forceAtlas2Based' // Explicitly set solver
                }
            });
        }
        initNetwork();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('geminiKey').value = localStorage.getItem('geminiKey') || '';
            document.getElementById('githubToken').value = localStorage.getItem('githubToken') || '';
            document.getElementById('githubRepo').value = localStorage.getItem('githubRepo') || '';
        });

        function saveVaultKeys() {
            localStorage.setItem('geminiKey', document.getElementById('geminiKey').value);
            localStorage.setItem('githubToken', document.getElementById('githubToken').value);
            localStorage.setItem('githubRepo', document.getElementById('githubRepo').value);
            alert("Vault Secured.");
        }

        function saveNewNode() {
            const newNodeLabel = document.getElementById('newNodeLabel').value.trim();
            if (!newNodeLabel) {
                alert("Please enter a name for your new seed.");
                return;
            }

            const selectedParents = [];
            const checkboxes = document.querySelectorAll('input[name="seedParents"]:checked');
            checkboxes.forEach(checkbox => {
                selectedParents.push(checkbox.value);
            });

            if (selectedParents.length === 0) {
                alert("Please select at least one parent for your new seed.");
                return;
            }

            // Generate a unique ID for the new node
            const newNodeId = newNodeLabel.replace(/\s+/g, '-').toLowerCase() + '-' + Date.now(); 

            // Add the new node
            treeData.nodes.push({ 
                id: newNodeId, 
                label: newNodeLabel.replace(/ /g, '\n'), // Newline for better display
                group: 'active', // Default group for new nodes
                x: 0, // Explicitly set x coordinate to 0
                y: 0  // Explicitly set y coordinate to 0
            });

            // Add edges for each selected parent
            selectedParents.forEach(parentId => {
                treeData.edges.push({ from: parentId, to: newNodeId });
            });

            // Save to localStorage
            localStorage.setItem('lifeSkillTree', JSON.stringify(treeData));

            // Update the network visualization
            if (network) {
                network.destroy(); // Destroy existing network
            }
            initNetwork(); // Re-initialize with updated data
            network.fit({ animation: true }); // Fit the camera to show the new seed

            // Close the modal and clear input
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('newNodeLabel').value = '';
            checkboxes.forEach(checkbox => checkbox.checked = false); // Uncheck all parent checkboxes
        }

        async function executeSelfModification() {
            const geminiKey = localStorage.getItem('geminiKey');
            const githubToken = localStorage.getItem('githubToken');
            const repo = localStorage.getItem('githubRepo');
            const prompt = document.getElementById('aiPrompt').value;

            if (!geminiKey || !githubToken || !repo) return alert("Please fill out and save the API Vault first.");
            if (!prompt) return alert("Give the Oracle a command.");

            document.getElementById('devConsole').classList.add('hidden');
            
            try {
                // THE UPGRADE: Fetch clean code from GitHub directly
                alert("Fetching clean source code from GitHub...");
                const getUrl = `https://api.github.com/repos/${repo}/contents/index.html`;
                const getRes = await fetch(getUrl, { headers: { 'Authorization': `Bearer ${githubToken}`, 'Content-Type': 'application/json' } });
                const fileData = await getRes.json();
                
                if (!fileData.sha) throw new Error("Could not find index.html. Check your GitHub Path.");
                
                // Decode the clean code from Base64
                const cleanHTML = decodeURIComponent(escape(atob(fileData.content)));
                const fileSha = fileData.sha;
                
                alert("Consulting Gemini... (This may take 10-20 seconds)");
                const newHTML = await callGemini(geminiKey, prompt, cleanHTML);
                
                alert("Code rewritten. Pushing to GitHub...");
                await pushToGitHub(githubToken, repo, newHTML, fileSha);

                startDeploymentLoader();

            } catch (error) {
                alert("Modification Failed: " + error.message);
                document.getElementById('devConsole').classList.remove('hidden');
            }
        }

        async function callGemini(apiKey, instruction, currentCode) {
            const systemPrompt = `You are an AI hooked directly into a website's source code. The user wants to modify their site. 
            Here is their instruction: "${instruction}". 
            Rewrite the following HTML to include their request. 
            CRITICAL RULE: Return ONLY the raw HTML code. Do not use markdown blocks (\`\`\`html). Do not explain yourself. Start with <!DOCTYPE html> and end with </html>.`;

            // THE UPGRADE: Pointed to the stable gemini-2.5-flash model
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt + "\n\nCURRENT CODE:\n" + currentCode }] }]
                })
            });
            
            const data = await response.json();
            
            if (data.error) throw new Error(`Google API said: ${data.error.message}`);
            if (!data.candidates || data.candidates.length === 0) throw new Error("Google API returned an empty response.");

            let newCode = data.candidates[0].content.parts[0].text;
            newCode = newCode.replace(/^```html\n?/, '').replace(/\n?```$/, '');
            return newCode;
        }

       async function pushToGitHub(token, repo, newContent, sha) {
            const url = `https://api.github.com/repos/${repo}/contents/index.html`;
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            const contentEncoded = btoa(unescape(encodeURIComponent(newContent)));

            const putRes = await fetch(url, {
                method: 'PUT',
                headers: headers,
                body: JSON.stringify({ message: "Self-Modification Update via API", content: contentEncoded, sha: sha })
            });
            
            // --- UPGRADED ERROR TRACKING ---
            if (!putRes.ok) {
                const errorData = await putRes.json();
                throw new Error(`GitHub said: ${errorData.message}`);
            }
        }

        function startDeploymentLoader() {
            const overlay = document.getElementById('deploymentOverlay');
            const ring = document.getElementById('loadingRing');
            const countdownText = document.getElementById('countdownText');
            
            overlay.classList.remove('hidden');
            void ring.offsetWidth; 
            ring.style.strokeDashoffset = '0'; 

            let secondsLeft = 90;
            const timer = setInterval(() => {
                secondsLeft--;
                countdownText.innerText = secondsLeft + 's';
                
                if (secondsLeft <= 0) {
                    clearInterval(timer);
                    window.location.reload(true); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
