<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Life Skill Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; margin: 0; padding: 0; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #mynetwork { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* Modal Animations */
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="ui-layer p-6 flex justify-between items-start">
        <div>
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-emerald-400 to-purple-400 uppercase tracking-widest drop-shadow-lg">Life Constellation</h1>
            <p class="text-slate-400 font-mono mt-1 text-sm">Mind // Body // Soul</p>
        </div>
        <button onclick="openAddModal()" class="interactive bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)] transition-all flex items-center gap-2">
            <span class="text-xl leading-none">+</span> New Seed
        </button>
    </div>

    <div id="mynetwork"></div>

    <div id="questModal" class="hidden interactive fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-950 border border-slate-800 p-8 rounded-2xl max-w-md w-full shadow-[0_0_30px_rgba(99,102,241,0.2)] modal-enter">
            <h2 id="modalTitle" class="text-2xl font-bold text-indigo-400 mb-2 uppercase tracking-tight"></h2>
            <p id="modalParent" class="text-xs text-slate-500 font-mono mb-6 uppercase tracking-widest"></p>
            <div id="questList" class="text-slate-300 text-sm mb-6 whitespace-pre-wrap font-mono leading-relaxed bg-slate-900 p-4 rounded border border-slate-800 min-h-[100px]"></div>
            
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal('questModal')" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-colors">Close</button>
                <button onclick="deleteCurrentNode()" class="py-3 px-4 border border-red-900/50 hover:bg-red-900/20 text-red-500 font-bold rounded-lg transition-colors">Delete</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="hidden interactive fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-950 border border-emerald-900 p-8 rounded-2xl max-w-md w-full shadow-[0_0_30px_rgba(16,185,129,0.2)] modal-enter">
            <h2 class="text-2xl font-bold text-emerald-400 mb-6 uppercase tracking-tight">Plant a New Seed</h2>
            
            <label class="block text-xs text-slate-500 uppercase tracking-widest mb-1">Project/Idea Name</label>
            <input type="text" id="newNodeName" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-slate-200 mb-4 focus:outline-none focus:border-emerald-500" placeholder="e.g., Silva Method">
            
            <label class="block text-xs text-slate-500 uppercase tracking-widest mb-1">Connects To (Parent)</label>
            <select id="newNodeParent" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-slate-200 mb-4 focus:outline-none focus:border-emerald-500">
                <option value="Mind">The Mind</option>
                <option value="Body">The Body</option>
                <option value="Soul">The Soul</option>
            </select>

            <label class="block text-xs text-slate-500 uppercase tracking-widest mb-1">Initial Quest Steps</label>
            <textarea id="newNodeQuests" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-slate-200 mb-6 focus:outline-none focus:border-emerald-500 font-mono text-sm" placeholder="- Step 1...&#10;- Step 2..."></textarea>

            <div class="flex gap-4">
                <button onclick="closeModal('addModal')" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-colors">Cancel</button>
                <button onclick="saveNewNode()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-colors">Plant Seed</button>
            </div>
        </div>
    </div>

    <script>
        // --- Database Logic (LocalStorage) ---
        const DEFAULT_DATA = {
            nodes: [
                { id: "Mind", label: "The Mind", group: "planet" },
                { id: "Body", label: "The Body", group: "planet" },
                { id: "Soul", label: "The Soul", group: "planet" },
                { id: "Compendium", label: "Psychological\nCompendium", group: "withered" },
                { id: "Breathwork", label: "Breathing\nTechniques", group: "bridge" }
            ],
            edges: [
                { from: "Mind", to: "Compendium" },
                { from: "Body", to: "Breathwork" },
                { from: "Soul", to: "Breathwork" }
            ],
            quests: {
                "Compendium": { steps: "- Finalize 8-page master layout\n- Vector art for breathing nodes\n- Draft Field Logs", parent: "Mind" },
                "Breathwork": { steps: "- Wim Hof 10-day streak\n- Buteyko CO2 tolerance test", parent: "Body & Soul" }
            }
        };

        let treeData = JSON.parse(localStorage.getItem('lifeSkillTree')) || DEFAULT_DATA;
        let network = null;
        let currentNodeId = null;

        // --- Visualization Engine (Vis-Network) ---
        function initNetwork() {
            const container = document.getElementById('mynetwork');
            
            // -------------------------------------------------------------
            // THE ANCHOR SYSTEM: Lock the three planets in a center triangle
            // -------------------------------------------------------------
            const R = 180; // Distance from the dead center
            treeData.nodes.forEach(node => {
                if (node.id === 'Mind') { node.x = 0; node.y = -R; node.fixed = true; }
                if (node.id === 'Body') { node.x = R * 0.866; node.y = R * 0.5; node.fixed = true; } // Bottom Right
                if (node.id === 'Soul') { node.x = -R * 0.866; node.y = R * 0.5; node.fixed = true; } // Bottom Left
            });

            const data = {
                nodes: new vis.DataSet(treeData.nodes),
                edges: new vis.DataSet(treeData.edges)
            };
            
            const options = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: { color: '#e2e8f0', size: 14, face: 'ui-sans-serif', strokeWidth: 4, strokeColor: '#020617' },
                    borderWidth: 2,
                    shadow: true
                },
                edges: {
                    width: 2,
                    color: { color: '#334155', highlight: '#6366f1' },
                    smooth: { type: 'continuous' } // Keeps lines curved so they weave nicely
                },
                groups: {
                    planet: { size: 35, color: { background: '#0f172a', border: '#818cf8', highlight: '#6366f1' }, font: { size: 18, color: '#818cf8' } },
                    active: { color: { background: '#064e3b', border: '#10b981' } },
                    withered: { color: { background: '#291c1a', border: '#78350f' }, font: { color: '#a8a29e' } },
                    bridge: { color: { background: '#1e1b4b', border: '#a855f7' } }
                },
                physics: {
                    // Adjusted physics so nodes push away from the center but stay connected
                    forceAtlas2Based: { gravitationalConstant: -80, centralGravity: 0.005, springLength: 200, springConstant: 0.05 },
                    maxVelocity: 50,
                    solver: 'forceAtlas2Based',
                    timestep: 0.35,
                    stabilization: { iterations: 150 }
                }
            };

            network = new vis.Network(container, data, options);

            // Interaction Event
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    if (['Mind', 'Body', 'Soul'].includes(nodeId)) return; // Don't open quests for root planets
                    openQuestModal(nodeId);
                }
            });
        }

        // --- App Logic ---
        function openQuestModal(nodeId) {
            currentNodeId = nodeId;
            const node = treeData.nodes.find(n => n.id === nodeId);
            const questInfo = treeData.quests[nodeId] || { steps: "No steps defined yet.", parent: "Unknown" };
            
            document.getElementById('modalTitle').innerText = node.label.replace('\n', ' ');
            document.getElementById('modalParent').innerText = `Connected to: ${questInfo.parent}`;
            document.getElementById('questList').innerText = questInfo.steps;
            
            document.getElementById('questModal').classList.remove('hidden');
        }

        function openAddModal() {
            document.getElementById('newNodeName').value = '';
            document.getElementById('newNodeQuests').value = '';
            document.getElementById('addModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function saveNewNode() {
            const name = document.getElementById('newNodeName').value.trim();
            const parent = document.getElementById('newNodeParent').value;
            const steps = document.getElementById('newNodeQuests').value.trim();

            if (!name) return alert("Your seed needs a name.");

            const newId = 'node_' + Date.now(); // Unique ID
            
            // Format label with a line break if it's long
            const labelParts = name.split(' ');
            const label = labelParts.length > 1 ? labelParts[0] + '\n' + labelParts.slice(1).join(' ') : name;

            // Add to database
            treeData.nodes.push({ id: newId, label: label, group: 'active' });
            treeData.edges.push({ from: parent, to: newId });
            treeData.quests[newId] = { steps: steps || "No steps defined.", parent: parent };

            saveAndRender();
            closeModal('addModal');
        }

        function deleteCurrentNode() {
            if(!confirm("Are you sure you want to prune this branch?")) return;
            
            treeData.nodes = treeData.nodes.filter(n => n.id !== currentNodeId);
            treeData.edges = treeData.edges.filter(e => e.from !== currentNodeId && e.to !== currentNodeId);
            delete treeData.quests[currentNodeId];

            saveAndRender();
            closeModal('questModal');
        }

        function saveAndRender() {
            localStorage.setItem('lifeSkillTree', JSON.stringify(treeData));
            initNetwork(); // Re-draw the graph
        }

        // Boot up
        initNetwork();
    </script>
</body>
</html>
